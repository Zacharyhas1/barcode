<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Generator</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
        <div class="layout">
            <div class="barcode-container">
                <div class="format-toggle">
                    <button id="formatToggle" class="active" data-format="barcode">1D</button>
                    <button id="formatToggleQR" data-format="qr">QR</button>
                </div>
                <img id="barcode"/>
            </div>
            <div class="controls">
                <div class="input-container">
                    <input 
                        id="barcodeInput" 
                        type="text"
                        placeholder="Enter text to encode..."
                        autocapitalize="off"
                        autocorrect="off"
                        spellcheck="false"
                    />
                    <button id="saveButton">✓</button>
                </div>
                <div class="history-container" id="historyContainer">
                    <!-- History buttons will be added here -->
                </div>
                <div class="instructions">
                    Use the toggle to switch between barcode and QR code mode. Click the checkmark to save codes in your local storage. <strong>Long-press</strong> the checkmark to create a code that doesn't display the value in plain text (for e.g. passwords). Drag to re-order.
                </div>
            </div>
        </div>
    </div>
    <script src="jsBarcode.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
